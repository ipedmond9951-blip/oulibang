name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

# 防止重复部署（PR 也会触发 push，但 PR 用 preview 部署足够）
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  optimize-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. 拉取代码
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node（用于 Tailwind CSS 编译）
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装 ffmpeg + cwebp（视频转码 + 图片优化）
      - name: 🔧 Install ffmpeg + webp tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg webp

      # 4. 安装 npm 依赖（Tailwind CLI）
      - name: 📦 Install Tailwind CSS
        run: |
          cd .github/optimize
          npm install --no-audit --no-fund --silent

      # 5. 🎬 优化视频 + 图片 + CSS
      - name: 🎬 Optimize media (video/webp/css)
        run: |
          cd .github/optimize
          chmod +x optimize.sh
          ./optimize.sh

      # 6. 🚀 部署到 Vercel
      - name: 🚀 Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      # 7. ✅ 部署完成通知
      - name: ✅ Deployment summary
        if: success()
        run: |
          echo "## 🎉 部署成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 视频已转码（移动版 + 桌面版 + poster）" >> $GITHUB_STEP_SUMMARY
          echo "- 图片已转 WebP" >> $GITHUB_STEP_SUMMARY
          echo "- Tailwind CSS 已重新编译" >> $GITHUB_STEP_SUMMARY
          echo "- 已部署到 https://oulibang.com" >> $GITHUB_STEP_SUMMARY
